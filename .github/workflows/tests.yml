name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build Docker tester image
      run: docker build -t mountsync-tester tests/docker/

    - name: Run tests in Docker
      run: |
        docker run --rm --privileged \
          -v "$(pwd):/home/tester/mountsync" \
          mountsync-tester
